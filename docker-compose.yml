# ---------------------------------------------------------------
# 서대전여고 AI 플랫폼 - RAG 시스템 통합 (로컬 개발 환경)
# 변경사항:
#   - PostgreSQL → pgvector (벡터 검색)
#   - Redis 추가 (Celery 백그라운드 작업)
#   - Celery worker 추가 (문서 벡터화 처리)
#   - 로컬 개발용 설정 (HTTPS 제거)
# ---------------------------------------------------------------
version: '3.8'

services:
  # 1. Flask 애플리케이션 (웹앱)
  web:
    build: .
    container_name: ai_platform_web
    restart: always
    # 로컬 개발: 간단한 설정, 코드 변경 시 자동 재시작
    command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 4 --timeout 300 --access-logfile - --error-logfile - --reload app:app
    ports:
      - "8081:8080"  # 외부(8081) -> 내부(8080) 연결
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FLASK_APP=app.py
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./:/app  # 로컬 개발: 전체 코드 마운트 (Hot Reload)
    depends_on:
      - db
      - redis

  # 2. PostgreSQL + pgvector 데이터베이스
  db:
    image: pgvector/pgvector:pg15  # pgvector 확장 포함 이미지
    container_name: ai_platform_db
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"  # 로컬에서 DB 접근 가능하도록 포트 노출
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. Redis (Celery 메시지 브로커)
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    restart: always
    ports:
      - "6379:6379"  # 로컬에서 Redis 접근 가능
    volumes:
      - redis_data:/data

  # 4. Celery Worker (백그라운드 작업)
  worker:
    build: .
    container_name: ai_platform_worker
    restart: always
    command: celery -A app.celery worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./:/app  # 로컬 개발: 코드 변경 시 워커 재시작 필요
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data: