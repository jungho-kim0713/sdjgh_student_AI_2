<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구글 계정 연동 - 서대전여고 AI</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ version }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h1 class="main-title">서대전여고 수업용 AI</h1>
        <h2>구글 연동 완료</h2>
        <p style="text-align:center; color:#555; margin-bottom: 20px;">
            사용할 이름을 입력해주세요.<br>
            <small>({{ email }})</small>
        </p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flashes">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.google_register_name') }}" class="auth-form">
            <div class="form-group">
                <label for="name">이름 (또는 학번+이름)</label>
                <input type="text" id="name" name="name" required placeholder="예: 10101 홍길동">
            </div>
            <button type="submit" class="auth-button">가입 완료</button>
        </form>
    </div>
</body>
</html>
